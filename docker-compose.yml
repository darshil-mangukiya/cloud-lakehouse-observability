# All fallback credentials in this file are for local Docker development only.
# Use externally managed secrets and non-default credentials in any deployment.
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lakehouse} -d ${POSTGRES_DB:-lakehouse}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_local_only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/${POSTGRES_DB:-lakehouse}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me_local_only}
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD:-change_me_local_only} --firstname Data --lastname Platform --role Admin --email admin@example.com || true"
    volumes:
      - ./:/opt/airflow/data-lakehouse-platform
      - ./airflow/dags:/opt/airflow/dags

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/${POSTGRES_DB:-lakehouse}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me_local_only}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-lakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./:/opt/airflow/data-lakehouse-platform
      - ./airflow/dags:/opt/airflow/dags

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/${POSTGRES_DB:-lakehouse}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me_local_only}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-lakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
    command: scheduler
    volumes:
      - ./:/opt/airflow/data-lakehouse-platform
      - ./airflow/dags:/opt/airflow/dags

  dbt:
    build:
      context: .
      dockerfile: docker/dbt/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-lakehouse}
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
    volumes:
      - ./:/workspace
    working_dir: /workspace/dbt
    command: ["dbt", "debug", "--profiles-dir", "."]

  validator:
    build:
      context: .
      dockerfile: docker/validator/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: ["python", "pipelines/run_platform.py", "--reset"]

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    depends_on:
      validator:
        condition: service_completed_successfully
    volumes:
      - ./:/workspace
    working_dir: /workspace
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "dashboards/streamlit/app.py", "--server.address=0.0.0.0"]

volumes:
  postgres_data:
  minio_data:
